<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Kalkulyator</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #1e1e2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        .container {
            background: #2b2b40;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 350px;
        }

        h2 {
            text-align: center;
            color: #a6e3a1;
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            margin-bottom: 20px;
            background: #1e1e2e;
            border-radius: 10px;
            padding: 5px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }

        .tab.active {
            background: #a6e3a1;
            color: #1e1e2e;
            font-weight: bold;
        }

        .screen {
            background: #181825;
            padding: 20px;
            border-radius: 10px;
            text-align: right;
            margin-bottom: 20px;
            font-size: 2rem;
            min-height: 60px;
            word-wrap: break-word;
        }

        .keys {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            background: #3b3b58;
            color: white;
        }

        button:hover {
            background: #4b4b68;
        }

        .operator {
            background: #f38ba8;
            color: #1e1e2e;
            font-weight: bold;
        }

        .equal {
            background: #a6e3a1;
            color: #1e1e2e;
            grid-column: span 1;
            font-weight: bold;
        }

        .clear {
            background: #fab387;
            color: #1e1e2e;
        }

        .converter {
            display: none;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        input {
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #181825;
            color: white;
            font-size: 1rem;
        }

        .result-box {
            background: #a6e3a1;
            color: #1e1e2e;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Smart Tools</h2>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('calc')">Kalkulyator</div>
            <div class="tab" onclick="switchTab('conv')">Valyuta</div>
        </div>

        <!-- Kalkulyator Qismi -->
        <div id="calculator">
            <div class="screen" id="display">0</div>
            <div class="keys">
                <button class="clear" onclick="clearDisplay()">C</button>
                <button onclick="append('/')">/</button>
                <button onclick="append('*')">×</button>
                <button onclick="deleteChar()">⌫</button>

                <button onclick="append('7')">7</button>
                <button onclick="append('8')">8</button>
                <button onclick="append('9')">9</button>
                <button class="operator" onclick="append('-')">-</button>

                <button onclick="append('4')">4</button>
                <button onclick="append('5')">5</button>
                <button onclick="append('6')">6</button>
                <button class="operator" onclick="append('+')">+</button>

                <button onclick="append('1')">1</button>
                <button onclick="append('2')">2</button>
                <button onclick="append('3')">3</button>
                <button class="equal" onclick="calculate()">=</button>

                <button onclick="append('0')" style="grid-column: span 3">0</button>
                <button onclick="append('.')">.</button>
            </div>
        </div>

        <!-- Valyuta Konverter Qismi -->
        <div id="converter" class="converter">
            <div class="input-group">
                <label>USD miqdori:</label>
                <input type="number" id="usdInput" placeholder="Masalan: 100" oninput="convertCurrency()">
            </div>
            <div class="result-box" id="resultText">0 UZS</div>
            <p style="font-size: 0.8rem; text-align: center; color: #aaa;">Kurs: 1 USD = 12,600 UZS (Taxminiy)</p>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let currentInput = '';

        function append(value) {
            if (currentInput === '' && value === '/') return;
            currentInput += value;
            display.innerText = currentInput;
        }

        function clearDisplay() {
            currentInput = '';
            display.innerText = '0';
        }

        function deleteChar() {
            currentInput = currentInput.slice(0, -1);
            display.innerText = currentInput || '0';
        }

        function calculate() {
            try {
                currentInput = eval(currentInput).toString();
                display.innerText = currentInput;
            } catch {
                display.innerText = 'Xato';
                currentInput = '';
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if (tab === 'calc') {
                document.querySelector('.tab:nth-child(1)').classList.add('active');
                document.getElementById('calculator').style.display = 'block';
                document.getElementById('converter').style.display = 'none';
            } else {
                document.querySelector('.tab:nth-child(2)').classList.add('active');
                document.getElementById('calculator').style.display = 'none';
                document.getElementById('converter').style.display = 'flex';
            }
        }

        function convertCurrency() {
            const usd = document.getElementById('usdInput').value;
            const rate = 12600; // Kursni o'zgartirishingiz mumkin
            const uzs = (usd * rate).toLocaleString();
            document.getElementById('resultText').innerText = `${uzs} UZS`;
        }
    </script>

</body>

</html>
